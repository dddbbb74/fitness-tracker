<!-- generate-icons.html (open in browser to create icons) -->
<!DOCTYPE html>
<html>
<body>
<h2>Right-click each icon and "Save Image As"</h2>
<p>Save as <code>icons/icon-192.png</code>:</p>
<canvas id="c192" width="192" height="192"></canvas>
<p>Save as <code>icons/icon-512.png</code>:</p>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const s = canvas.width;
    // Background
    ctx.fillStyle = '#3b82f6';
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, s * 0.2);
    ctx.fill();
    // Dumbbell icon
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${s * 0.45}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🏋️', s / 2, s / 2);
    // App name
    ctx.font = `bold ${s * 0.12}px -apple-system, sans-serif`;
    ctx.fillText('FitTrack', s / 2, s * 0.82);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
